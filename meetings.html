<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Reminders - Gatekeeper AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:20px;padding-bottom:80px}
.header{text-align:center;margin-bottom:20px}
.header h1{color:#FFB300;font-size:24px}
.header p{color:#888;font-size:13px}
.meeting-card{background:#1a1a2e;border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid #FFB300}
.meeting-card.upcoming{border-left-color:#00ff88}
.meeting-card.today{border-left-color:#f5a623}
.meeting-card.overdue{border-left-color:#e94560}
.meeting-card .title{font-size:16px;font-weight:700;margin-bottom:4px}
.meeting-card .details{font-size:13px;color:#bbb;margin-bottom:4px}
.meeting-card .time{font-size:12px;color:#888}
.meeting-card .badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:10px;font-weight:600;margin-top:6px}
.badge-upcoming{background:#00ff8820;color:#00ff88}
.badge-today{background:#f5a62320;color:#f5a623}
.badge-overdue{background:#e9456020;color:#e94560}
.empty-state{text-align:center;padding:40px;color:#666}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.btn{background:#FFB300;color:#000;border:none;padding:10px 20px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px}
.btn:hover{background:#e6a300}
.btn-danger{background:#e94560;color:#fff}
.btn-danger:hover{background:#cc2244}
.footer{text-align:center;margin-top:20px;color:#666;font-size:12px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;display:flex;padding:10px;border-top:1px solid #2a2a2a}
.nav-item{flex:1;text-align:center;padding:8px;border-radius:8px;color:#888;font-size:12px;cursor:pointer}
.nav-item.active{background:#FFB30020;color:#FFB300}
</style>
</head>
<body>

<div class="header">
<h1>📅 Meeting Reminders</h1>
<p>Your upcoming meetings, automatically detected</p>
</div>

<div id="meetingsList">
<div class="empty-state">
<div class="icon">📭</div>
<p>No meetings detected yet.</p>
<p style="font-size:12px;margin-top:4px;">When you receive a meeting message, it will appear here.</p>
</div>
</div>

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;">
<button class="btn" onclick="window.location.href='gatekeeper_mp_edition.html'">📥 Go to Inbox</button>
<button class="btn btn-danger" onclick="clearMeetings()">🗑️ Clear All</button>
</div>

<div class="footer">
2026 Gatekeeper AI | Meeting Reminders
</div>

<div class="bottom-nav">
<div class="nav-item" onclick="window.location.href='gatekeeper_mp_edition.html'">Inbox</div>
<div class="nav-item active">📅 Meetings</div>
<div class="nav-item" onclick="window.location.href='daily_summary.html'">Summary</div>
</div>

<script>
let meetings = [];

// Sample meetings (these would normally be auto-detected)
const sampleMeetings = [
    {
        title: "Parliament Budget Committee",
        date: "2026-06-20",
        time: "14:00",
        location: "Committee Room 12",
        source: "Email",
        sourceText: "📧 from Parliament Secretariat",
        status: "upcoming"
    },
    {
        title: "Constituency Meeting",
        date: "2026-06-19",
        time: "10:00",
        location: "Community Hall, Ward 4",
        source: "WhatsApp",
        sourceText: "💬 from Constituent - Ward 4",
        status: "today"
    },
    {
        title: "Minister's Briefing",
        date: "2026-06-18",
        time: "09:30",
        location: "Minister's Office",
        source: "SMS",
        sourceText: "📱 from Minister's Office",
        status: "overdue"
    }
];

function loadMeetings() {
    const display = meetings.length ? meetings : sampleMeetings;
    
    if (!display.length) {
        document.getElementById('meetingsList').innerHTML = `
            <div class="empty-state">
                <div class="icon">📭</div>
                <p>No meetings detected yet.</p>
                <p style="font-size:12px;margin-top:4px;">When you receive a meeting message, it will appear here.</p>
            </div>
        `;
        return;
    }

    let html = '';
    for (let m of display) {
        const statusClass = m.status || 'upcoming';
        const badgeClass = statusClass === 'upcoming' ? 'badge-upcoming' : (statusClass === 'today' ? 'badge-today' : 'badge-overdue');
        const badgeText = statusClass === 'upcoming' ? '⏳ Upcoming' : (statusClass === 'today' ? '📅 Today' : '⚠️ Overdue');
        const timeDisplay = m.time ? new Date('2000-01-01T' + m.time + ':00').toLocaleTimeString('en-ZW', {hour:'2-digit',minute:'2-digit'}) : 'Time TBD';
        const dateDisplay = new Date(m.date + 'T' + (m.time || '12:00')).toLocaleDateString('en-ZW', { 
            weekday: 'short', 
            month: 'short', 
            day: 'numeric' 
        });
        
        html += `
            <div class="meeting-card ${statusClass}">
                <div class="title">${m.title}</div>
                <div class="details">📅 ${dateDisplay} at ${timeDisplay}</div>
                ${m.location ? `<div class="details">📍 ${m.location}</div>` : ''}
                <div class="details">${m.sourceText || m.source}</div>
                <div class="time">${m.sourceText || ''}</div>
                <div class="badge ${badgeClass}">${badgeText}</div>
            </div>
        `;
    }
    document.getElementById('meetingsList').innerHTML = html;
}

function clearMeetings() {
    if (confirm('Clear all meetings?')) {
        meetings = [];
        loadMeetings();
    }
}

loadMeetings();
</script>
</body>
</html>
