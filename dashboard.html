<!DOCTYPE html>
<html>
<head>
    <title>Gatekeeper AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; padding: 20px; background: #0a0a0a; color: white; }
        .urgent { background: #e94560; padding: 20px; margin: 10px 0; border-radius: 10px; font-size: 24px; text-align: center; }
        .important { background: #f5a623; padding: 20px; margin: 10px 0; border-radius: 10px; font-size: 24px; text-align: center; }
        .normal { background: #4a4e69; padding: 20px; margin: 10px 0; border-radius: 10px; font-size: 24px; text-align: center; }
        button { background: #00d4ff; padding: 15px; margin: 10px; font-size: 16px; border: none; border-radius: 10px; width: 90%; }
    </style>
</head>
<body>
    <h1>🔒 Gatekeeper AI</h1>
    <p>Demo for Honourable MP - Test message classification</p>
    
    <button onclick="test('Borehole broken at Nketa 8', 'No water for 500 people')">🔴 Borehole broken, no water</button>
    <button onclick="test('Parliament Meeting', '2pm today in Committee Room')">🟠 Meeting at Parliament 2pm</button>
    <button onclick="test('Hello', 'How are you?')">⚪ Hello, how are you?</button>
    
    <div id="result" style="margin-top: 30px;"></div>
    
    <script>
        async function test(subject, body) {
            let response = await fetch('http://127.0.0.1:5000/classify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({subject: subject, body: body})
            });
            let data = await response.json();
            let color = data.label === 'URGENT' ? 'urgent' : (data.label === 'IMPORTANT' ? 'important' : 'normal');
            document.getElementById('result').innerHTML = `<div class="${color}">${data.label}</div>`;
        }
    </script>
</body>
</html>
