<!DOCTYPE html>
<html>
<head>
    <title>Paynow Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{font-family:sans-serif;background:#0a0a0a;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .box{background:#1a1a2e;padding:35px;border-radius:16px;border:1px solid #2a2a2a;max-width:400px;width:100%;text-align:center}
        .box h1{color:#FFB300;font-size:24px}
        .box p{color:#888;font-size:14px;margin:10px 0}
        .box .btn{width:100%;padding:14px;border:none;border-radius:8px;background:#FFB300;color:#000;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px}
        .box .btn:hover{background:#e6a300}
        .box .info{background:#1a2a1a;padding:12px;border-radius:8px;margin:10px 0;font-size:12px;color:#aaa;text-align:left}
        .box .info strong{color:#FFB300}
    </style>
</head>
<body>
<div class="box">
    <h1>🔒 Gatekeeper AI</h1>
    <p>Paynow Test</p>

    <div class="info">
        <strong>Test Instructions:</strong><br>
        1. Click "Test USD" below<br>
        2. Enter phone: <strong>0771111111</strong><br>
        3. Select payment method: <strong>EcoCash</strong><br>
        4. Select: <strong>Faked Success</strong><br>
        5. Complete the test
    </div>

    <button class="btn" onclick="testPaynow()">💳 Test USD ($1)</button>

    <p style="font-size:11px;color:#444;margin-top:15px;">No real money is moved. Test mode only.</p>
</div>

<script>
function testPaynow() {
    // Use the simplest possible Paynow request
    const merchant_id = '25438';
    const merchant_key = 'e845ff38-8afa-4898-bc84-10623af0a2a2';
    const amount = '1';
    const currency = 'USD';
    const phone = '0771111111';
    const reference = 'TEST-' + Date.now();
    
    // Build the URL
    const baseUrl = 'https://www.paynow.co.zw/interface/initiate';
    const params = new URLSearchParams({
        merchant_id: merchant_id,
        merchant_key: merchant_key,
        reference: reference,
        amount: amount,
        currency: currency,
        phone: phone,
        email: 'info@gatekeeperai.co.zw',
        description: 'Gatekeeper AI Test',
        return_url: 'https://gatekeeperai.co.zw/payment_success.html',
        cancel_url: 'https://gatekeeperai.co.zw/payment_cancel.html'
    });
    
    // Remove authemail to avoid errors
    const url = baseUrl + '?' + params.toString();
    
    // Open in new window
    const win = window.open(url, '_blank');
    if (!win) {
        alert('Please allow popups for this site.');
    }
}
</script>
</body>
</html>
