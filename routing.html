<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routing Center - Gatekeeper AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
            padding-bottom: 80px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            color: #FFB300;
            font-size: 26px;
        }
        .header p {
            color: #888;
            font-size: 14px;
        }

        /* Cards */
        .card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 14px;
            border: 1px solid #2a2a2a;
        }
        .card h3 {
            color: #FFB300;
            font-size: 16px;
            margin-bottom: 6px;
        }
        .card p {
            color: #aaa;
            font-size: 13px;
            line-height: 1.5;
        }
        .card .badge {
            display: inline-block;
            background: #006400;
            color: #fff;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 10px;
            margin-top: 6px;
        }

        /* Buttons */
        .btn {
            background: #FFB300;
            color: #000;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            margin-top: 8px;
        }
        .btn-danger {
            background: #e94560;
            color: #fff;
        }
        .btn-secondary {
            background: #2a2a2a;
            color: #fff;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        /* Inputs */
        input,
        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0a0a0a;
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .flex {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Log */
        .log-item {
            background: #0a0a0a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 4px solid #FFB300;
            font-size: 13px;
            color: #ccc;
        }
        .log-item .time {
            color: #666;
            font-size: 11px;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a2e;
            display: flex;
            padding: 10px;
            border-top: 1px solid #2a2a2a;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            color: #888;
            font-size: 12px;
            cursor: pointer;
        }
        .nav-item.active {
            background: #FFB30020;
            color: #FFB300;
        }
        .empty {
            text-align: center;
            color: #666;
            padding: 30px 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📡 Routing Center</h1>
        <p>Automatically forward messages to the right department</p>
    </div>

    <!-- Add Department -->
    <div class="card">
        <h3>➕ Add Department</h3>
        <input type="text" id="deptName" placeholder="Department name (e.g. Water, Welfare)">
        <input type="text" id="deptContact" placeholder="Contact name or number">
        <input type="text" id="deptKeywords" placeholder="Keywords (comma separated: borehole, water, broken)">
        <button class="btn" onclick="addDepartment()">Add Department</button>
    </div>

    <!-- My Departments -->
    <div class="card">
        <h3>📋 My Departments</h3>
        <div id="departmentList">
            <div class="empty">No departments yet. Add one above.</div>
        </div>
    </div>

    <!-- Forwarding Log -->
    <div class="card">
        <h3>📤 Forwarding Log</h3>
        <div id="logList">
            <div class="empty">No messages forwarded yet.</div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='gatekeeper_mp_edition.html'">Inbox</div>
        <div class="nav-item" onclick="window.location.href='meetings.html'">Meetings</div>
        <div class="nav-item" onclick="window.location.href='calls.html'">Calls</div>
        <div class="nav-item active" onclick="window.location.href='routing.html'">Routing</div>
        <div class="nav-item" onclick="window.location.href='settings.html'">Settings</div>
    </div>

    <script>
        // Load saved data
        let departments = JSON.parse(localStorage.getItem('routing_departments') || '[]');
        let logs = JSON.parse(localStorage.getItem('routing_logs') || '[]');

        function renderDepartments() {
            const container = document.getElementById('departmentList');
            if (departments.length === 0) {
                container.innerHTML = `<div class="empty">No departments yet. Add one above.</div>`;
                return;
            }
            let html = '';
            departments.forEach((dept, index) => {
                html += `
                    <div style="background:#0a0a0a;padding:12px;border-radius:8px;margin-bottom:8px;border-left:4px solid #FFB300;">
                        <strong>${dept.name}</strong>
                        <div style="color:#888;font-size:12px;">📞 ${dept.contact}</div>
                        <div style="color:#888;font-size:11px;">🔑 ${dept.keywords}</div>
                        <button class="btn btn-danger btn-sm" onclick="removeDepartment(${index})">Remove</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderLogs() {
            const container = document.getElementById('logList');
            if (logs.length === 0) {
                container.innerHTML = `<div class="empty">No messages forwarded yet.</div>`;
                return;
            }
            let html = '';
            logs.slice().reverse().forEach(log => {
                html += `
                    <div class="log-item">
                        <strong>📤 ${log.department}</strong>
                        <div>${log.message}</div>
                        <div class="time">${log.time}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function addDepartment() {
            const name = document.getElementById('deptName').value.trim();
            const contact = document.getElementById('deptContact').value.trim();
            const keywords = document.getElementById('deptKeywords').value.trim();

            if (!name || !contact || !keywords) {
                alert('Please fill in all fields.');
                return;
            }

            departments.push({ name, contact, keywords });
            localStorage.setItem('routing_departments', JSON.stringify(departments));

            document.getElementById('deptName').value = '';
            document.getElementById('deptContact').value = '';
            document.getElementById('deptKeywords').value = '';

            renderDepartments();
            alert('✅ Department added!');
        }

        function removeDepartment(index) {
            if (confirm('Remove this department?')) {
                departments.splice(index, 1);
                localStorage.setItem('routing_departments', JSON.stringify(departments));
                renderDepartments();
            }
        }

        // Sample log entry (for demo)
        function addSampleLog() {
            const sample = {
                department: 'Water Department',
                message: 'Borehole broken in Ward 4. Forwarded to Cllr Moyo.',
                time: new Date().toLocaleString()
            };
            logs.push(sample);
            localStorage.setItem('routing_logs', JSON.stringify(logs));
            renderLogs();
        }

        // Load on page open
        renderDepartments();
        renderLogs();

        // Add a sample log if empty (for demo purposes)
        if (logs.length === 0) {
            addSampleLog();
        }
    </script>

</body>
  </html>
