<!DOCTYPE html>
<html>
<head>
    <title>Gatekeeper AI - Pay</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0a; 
            color: #fff; 
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 16px; 
        }
        .container { 
            background: #1a1a2e; 
            padding: 28px; 
            border-radius: 16px; 
            max-width: 400px; 
            width: 100%; 
            border: 1px solid #2a2a2a; 
        }
        .logo { 
            color: #FFB300; 
            font-size: 22px; 
            text-align: center; 
            font-weight: bold; 
        }
        .logo span { color: #00ff88; }
        .subtitle { 
            color: #888; 
            font-size: 13px; 
            text-align: center; 
            margin: 5px 0 20px; 
        }
        .test-badge { 
            display: inline-block; 
            background: #e94560; 
            color: #fff; 
            padding: 2px 12px; 
            border-radius: 12px; 
            font-size: 10px; 
            font-weight: bold; 
        }
        .form-group { margin-bottom: 16px; }
        .form-group label { 
            display: block; 
            color: #aaa; 
            font-size: 13px; 
            font-weight: 600; 
            margin-bottom: 4px; 
        }
        .form-group input { 
            width: 100%; 
            padding: 14px 16px; 
            background: #0a0a0a; 
            border: 1px solid #2a2a2a; 
            border-radius: 10px; 
            color: #fff; 
            font-size: 16px; 
            box-sizing: border-box; 
        }
        .form-group input:focus { outline: none; border-color: #FFB300; }
        .pay-btn { 
            width: 100%; 
            padding: 16px; 
            background: #FFB300; 
            color: #000; 
            border: none; 
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s; 
            margin-top: 8px; 
        }
        .pay-btn:active { transform: scale(0.97); }
        .payment-methods { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 8px; 
            margin-bottom: 5px; 
        }
        .payment-methods .method { 
            background: #0a0a0a; 
            padding: 10px 6px; 
            border-radius: 8px; 
            text-align: center; 
            cursor: pointer; 
            border: 2px solid transparent; 
            font-size: 12px; 
            color: #888; 
            transition: all 0.2s; 
            -webkit-tap-highlight-color: transparent;
        }
        .payment-methods .method.active { 
            border-color: #FFB300; 
            color: #FFB300; 
            background: #1a1a1a; 
        }
        .payment-methods .method .icon { font-size: 22px; display: block; margin-bottom: 2px; }
        .info { 
            font-size: 11px; 
            color: #555; 
            text-align: center; 
            margin-top: 15px; 
            border-top: 1px solid #1a1a2e; 
            padding-top: 15px; 
            line-height: 1.6;
        }
        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px; 
        }
        .phone-hint {
            font-size: 11px;
            color: #444;
            margin-top: 3px;
        }
        .phone-hint span { color: #00ff88; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div class="logo">Gatekeeper <span>AI</span></div>
        <span class="test-badge">🧪 TEST</span>
    </div>
    <div class="subtitle">Pay with mobile money</div>

    <div class="form-group">
        <label>Select Payment Method</label>
        <div class="payment-methods" id="methodSelector">
            <div class="method active" data-method="ECOCASH" onclick="selectMethod('ECOCASH')">
                <span class="icon">📱</span> EcoCash
            </div>
            <div class="method" data-method="ONEMONEY" onclick="selectMethod('ONEMONEY')">
                <span class="icon">📱</span> OneMoney
            </div>
            <div class="method" data-method="INNBUCKS" onclick="selectMethod('INNBUCKS')">
                <span class="icon">📱</span> InnBucks
            </div>
        </div>
    </div>

    <div class="form-group">
        <label>📞 Phone Number</label>
        <input type="tel" id="phoneInput" value="0771111111" placeholder="e.g. 0771111111">
        <div class="phone-hint">Test: <span>0771111111</span></div>
    </div>

    <div class="form-group">
        <label>💰 Amount (USD)</label>
        <input type="number" id="amountInput" value="1.00" step="0.01" min="0.01">
    </div>

    <button class="pay-btn" onclick="payNow()">
        💳 Pay Now
    </button>

    <div class="info">
        🔒 You'll be redirected to Paynow to complete payment.<br>
        No real money is taken in test mode.
    </div>
</div>

<script>
    let selectedMethod = 'ECOCASH';

    function selectMethod(method) {
        selectedMethod = method;
        document.querySelectorAll('.payment-methods .method').forEach(el => {
            el.classList.remove('active');
        });
        document.querySelector(`.payment-methods .method[data-method="${method}"]`).classList.add('active');
    }

    function payNow() {
        const phone = document.getElementById('phoneInput').value.trim();
        const amount = document.getElementById('amountInput').value || '1.00';
        const reference = 'GK-' + Date.now();

        // Validate
        if (!phone || phone.length < 10) {
            alert('Please enter a valid phone number (e.g. 0771111111)');
            return;
        }

        // ✅ Build Paynow URL
        const merchantEmail = 'gatekeeperzw@gmail.com';
        const data = `search=${merchantEmail}&amount=${amount}&reference=${reference}&l=1`;
        const encoded = btoa(data);
        const paynowUrl = `https://www.paynow.co.zw/Payment/Link/?q=${encoded}`;

        console.log('Redirecting to:', paynowUrl);
        console.log('Phone:', phone);
        console.log('Method:', selectedMethod);
        console.log('Reference:', reference);

        // ✅ Redirect to Paynow
        window.location.href = paynowUrl;
    }

    // Allow Enter key on inputs
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const active = document.activeElement;
            if (active.tagName === 'INPUT') {
                payNow();
            }
        }
    });
</script>
</body>
          </html>
