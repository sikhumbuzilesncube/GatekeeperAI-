<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GatekeeperAI - ContiPay Test</title>
    <style>
        body { background: #1a1a2e; color: #fff; font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 400px; margin: auto; }
        .card { background: #16213e; padding: 20px; border-radius: 10px; margin: 15px 0; }
        .btn { background: #ffc107; color: #000; padding: 15px; width: 100%; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .btn:disabled { background: #555; }
        .error { background: #5c1a1a; border-left: 4px solid #ff4444; }
        .debug { background: #1a3a5c; border-left: 4px solid #4444ff; font-family: monospace; font-size: 12px; }
        select, input { width: 100%; padding: 10px; margin: 5px 0; background: #0f3460; color: #fff; border: 1px solid #555; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>GatekeeperAI Payment Test</h2>
        
        <div class="card">
            <label>Provider</label>
            <select id="provider">
                <option value="ecocash">📱 EcoCash (EC)</option>
                <option value="onemoney">📱 OneMoney</option>
            </select>
            
            <label>Amount USD</label>
            <input type="number" id="amount" value="1.00" step="0.01">
            
            <label>Phone Number</label>
            <input type="text" id="phone" value="0771111111">
            
            <button class="btn" id="payBtn" onclick="initiatePayment()">💳 Initiate Payment</button>
        </div>

        <div class="card error" id="errorBox" style="display:none;">
            <h3>⚠️ Connection Error</h3>
            <p id="errorMsg"></p>
        </div>

        <div class="card debug" id="debugBox" style="display:none;">
            <h3>🔍 Debug Info:</h3>
            <div id="debugLog"></div>
        </div>

        <div class="card">
            <p>🔒 <strong>Test Mode:</strong> No real money is moved. Use 0771111111 for test phone number.</p>
        </div>
    </div>

<script>
async function initiatePayment() {
    const payBtn = document.getElementById('payBtn');
    const errorBox = document.getElementById('errorBox');
    const debugBox = document.getElementById('debugBox');
    const debugLog = document.getElementById('debugLog');
    
    payBtn.disabled = true;
    payBtn.textContent = 'Processing...';
    errorBox.style.display = 'none';
    debugBox.style.display = 'block';
    debugLog.innerHTML = 'Sending request to Python proxy...<br>';

    const payload = {
        amount: document.getElementById('amount').value,
        currency: 'USD',
        phone: document.getElementById('phone').value,
        provider: document.getElementById('provider').value,
        reference: 'TEST-' + Date.now()
    };

    debugLog.innerHTML += `✅ Using correct ContiPay format<br>
    Merchant ID: 952<br>
    Amount: $${payload.amount}<br>
    Currency: ${payload.currency}<br>
    Phone: ${payload.phone}<br>
    Provider: ${payload.provider}<br>
    Reference: ${payload.reference}<br>`;

    try {
        const response = await fetch('/api/payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        debugLog.innerHTML += `Response Status: ${response.status}<br>`;
        
        // Check if response is actually JSON before parsing
        const contentType = response.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
            const text = await response.text();
            throw new Error(`Server returned non-JSON: ${text.substring(0, 100)}`);
        }

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || data.message || 'Payment failed');
        }

        debugLog.innerHTML += `✅ Success: ${JSON.stringify(data)}<br>`;
        alert('Test payment initiated! Check phone for prompt.');

    } catch (err) {
        document.getElementById('errorMsg').textContent = `Failed to execute 'json' on 'Response': ${err.message}`;
        errorBox.style.display = 'block';
        debugLog.innerHTML += `❌ Error: ${err.message}<br>`;
    } finally {
        payBtn.disabled = false;
        payBtn.textContent = '💳 Initiate Payment';
    }
}
</script>
</body>
</html>
