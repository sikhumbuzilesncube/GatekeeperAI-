<!DOCTYPE html>
<html>
<head>
    <title>Payment Cancelled - Gatekeeper AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{font-family:sans-serif;background:#0a0a0a;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .box{background:#1a1a2e;padding:40px;border-radius:16px;border:1px solid #2a2a2a;max-width:400px;width:100%;text-align:center}
        .box h1{color:#e94560;font-size:28px}
        .box p{color:#aaa;font-size:14px;margin:10px 0;line-height:1.6}
        .box .btn{background:#FFB300;color:#000;border:none;padding:12px 30px;border-radius:8px;font-weight:bold;cursor:pointer;font-size:16px}
        .box .btn:hover{background:#e6a300}
    </style>
</head>
<body>
<div class="box">
    <h1>❌ Payment Cancelled</h1>
    <p>Your payment was not completed.</p>
    <p style="font-size:12px;color:#888;">No charges have been made. You can try again anytime.</p>
    <br>
    <a href="payment.html" class="btn">Try Again</a>
</div>
</body>
</html>
