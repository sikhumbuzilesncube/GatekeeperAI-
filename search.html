<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search - Gatekeeper AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:20px;padding-bottom:80px}
.header{text-align:center;margin-bottom:20px}
.header h1{color:#FFB300;font-size:24px}
.header p{color:#888;font-size:13px}
.search-box{background:#1a1a2e;padding:16px;border-radius:12px;margin-bottom:15px;border:1px solid #2a2a2a}
.search-box input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid #333;background:#0a0a0a;color:#fff;font-size:16px;outline:none}
.search-box input:focus{border-color:#FFB300}
.search-box .filters{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.search-box .filters button{padding:6px 14px;border:none;border-radius:20px;font-size:12px;cursor:pointer;background:#333;color:#fff}
.search-box .filters button.active{background:#FFB300;color:#000;font-weight:bold}
.results{margin-top:10px}
.result-item{background:#1a1a2e;padding:14px;border-radius:10px;margin-bottom:8px;border-left:4px solid}
.result-item.urgent{border-left-color:#e94560}
.result-item.important{border-left-color:#f5a623}
.result-item.normal{border-left-color:#4a4e69}
.result-item .sender{font-weight:bold;font-size:14px}
.result-item .summary{color:#bbb;font-size:13px;margin:4px 0}
.result-item .meta{color:#666;font-size:11px}
.empty-state{text-align:center;padding:40px;color:#666}
.empty-state .icon{font-size:48px;margin-bottom:10px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;display:flex;padding:10px;border-top:1px solid #2a2a2a}
.nav-item{flex:1;text-align:center;padding:8px;border-radius:8px;color:#888;font-size:12px;cursor:pointer}
.nav-item.active{background:#FFB30020;color:#FFB300}
</style>
</head>
<body>

<div class="header">
    <h1>🔍 Search Messages</h1>
    <p>Find any message by keyword, sender, or date</p>
</div>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Type to search..." onkeyup="searchMessages()">
    <div class="filters">
        <button class="active" onclick="setFilter('all', this)">All</button>
        <button onclick="setFilter('URGENT', this)">🔴 URGENT</button>
        <button onclick="setFilter('IMPORTANT', this)">🟠 IMPORTANT</button>
        <button onclick="setFilter('NORMAL', this)">⚪ NORMAL</button>
    </div>
</div>

<div id="resultsContainer">
    <div class="empty-state">
        <div class="icon">🔍</div>
        <p>Type a keyword to search your messages</p>
    </div>
</div>

<div class="bottom-nav">
<div class="nav-item" onclick="window.location.href='gatekeeper_mp_edition.html'">Inbox</div>
<div class="nav-item" onclick="window.location.href='meetings.html'">Meetings</div>
<div class="nav-item" onclick="window.location.href='calls.html'">Calls</div>
<div class="nav-item active">Search</div>
</div>

<script>
const sampleMessages = [
    { sender: "Constituent - Ward 4", summary: "Borehole broken. 500 people have no water.", category: "URGENT", time: "2 min ago" },
    { sender: "Parliament Secretariat", summary: "2pm today in Committee Room 12. Budget review.", category: "IMPORTANT", time: "1 hour ago" },
    { sender: "Minister's Office", summary: "Please submit report by tomorrow.", category: "IMPORTANT", time: "2 hours ago" },
    { sender: "Constituent - Ward 8", summary: "Child cannot write exams. Need $50 urgently.", category: "URGENT", time: "3 hours ago" },
    { sender: "Chief Moyo", summary: "Village heads meeting on Saturday 10am.", category: "IMPORTANT", time: "5 hours ago" }
];

let currentFilter = 'all';

function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchMessages();
}

function searchMessages() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const container = document.getElementById('resultsContainer');
    
    let results = sampleMessages;
    
    if (query) {
        results = results.filter(m => 
            m.sender.toLowerCase().includes(query) || 
            m.summary.toLowerCase().includes(query)
        );
    }
    
    if (currentFilter !== 'all') {
        results = results.filter(m => m.category === currentFilter);
    }
    
    if (results.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="icon">📭</div>
                <p>No messages found</p>
                <p style="font-size:12px;margin-top:4px;">Try a different keyword</p>
            </div>
        `;
        return;
    }
    
    let html = '';
    for (let m of results) {
        const cls = m.category.toLowerCase();
        html += `
            <div class="result-item ${cls}">
                <div class="sender">${m.sender}</div>
                <div class="summary">${m.summary}</div>
                <div class="meta">${m.category} • ${m.time}</div>
            </div>
        `;
    }
    container.innerHTML = html;
}
</script>
</body>
</html>
