<!DOCTYPE html>
<html>
<head>
    <title>Gatekeeper AI - Admin Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0a; color: white; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .header h1 { color: #FFB300; font-size: 28px; }
        .header h1 span { color: white; }
        .header .badge { background: #FFB300; color: black; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: #1a1a2e; padding: 20px; border-radius: 16px; text-align: center; border: 1px solid #2a2a2a; }
        .stat-number { font-size: 36px; font-weight: bold; color: #FFB300; }
        .stat-label { color: #888; font-size: 13px; margin-top: 5px; }
        .stat-card.urgent .stat-number { color: #e94560; }
        .stat-card.success .stat-number { color: #00ff88; }
        .stat-card.warning .stat-number { color: #FFB300; }
        
        .section-title { color: #FFB300; font-size: 20px; margin: 25px 0 15px 0; border-bottom: 1px solid #2a2a2a; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; background: #1a1a2e; border-radius: 16px; overflow: hidden; }
        th { background: #2a2a2a; color: #FFB300; padding: 14px; text-align: left; font-size: 13px; }
        td { padding: 14px; border-bottom: 1px solid #2a2a2a; font-size: 14px; }
        tr:hover { background: #222244; }
        .status-active { color: #00ff88; }
        .status-trial { color: #FFB300; }
        .status-expired { color: #e94560; }
        
        .role-badge { background: #2a2a2a; padding: 3px 10px; border-radius: 12px; font-size: 11px; display: inline-block; }
        .role-badge.mp { background: #e94560; color: white; }
        .role-badge.ceo { background: #00d4ff; color: black; }
        .role-badge.councillor { background: #FFB300; color: black; }
        .role-badge.business { background: #00ff88; color: black; }
        
        .footer { margin-top: 40px; text-align: center; color: #666; font-size: 12px; border-top: 1px solid #2a2a2a; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔒 Gatekeeper <span>AI</span></h1>
        <div class="badge">🇿🇼 Admin Dashboard</div>
    </div>

    <div class="stats">
        <div class="stat-card success">
            <div class="stat-number" id="totalUsers">0</div>
            <div class="stat-label">👥 Total Users</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="activeUsers">0</div>
            <div class="stat-label">✅ Active Subscriptions</div>
        </div>
        <div class="stat-card warning">
            <div class="stat-number" id="trialUsers">0</div>
            <div class="stat-label">⏳ Free Trial</div>
        </div>
        <div class="stat-card urgent">
            <div class="stat-number" id="revenue">$0</div>
            <div class="stat-label">💰 Monthly Revenue</div>
        </div>
    </div>

    <div class="section-title">📋 Users</div>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Role</th>
                <th>Status</th>
                <th>Trial Ends</th>
                <th>Subscription</th>
            </tr>
        </thead>
        <tbody id="userTable">
            <tr>
                <td colspan="6" style="text-align:center; color:#888; padding:30px;">No users yet. Load sample data below.</td>
            </tr>
        </tbody>
    </table>

    <div class="section-title" style="margin-top:30px;">📊 Sample Data (Demo Mode)</div>
    <button onclick="loadDemoData()" style="background:#FFB300; color:black; border:none; padding:12px 25px; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:10px;">Load Sample Users</button>

    <div class="footer">
        © 2026 Gatekeeper AI | Built with ❤️ in Zimbabwe 🇿🇼
    </div>

    <script>
        function loadDemoData() {
            const users = [
                { name: "Hon. T. Moyo", phone: "0733xxxxxx", role: "MP", status: "Active", trial: "14 days", subscription: "$99/month" },
                { name: "Cllr. S. Ncube", phone: "0772xxxxxx", role: "Councillor", status: "Trial", trial: "7 days", subscription: "Free" },
                { name: "Mrs. R. Chikwanha", phone: "0783xxxxxx", role: "CEO", status: "Active", trial: "21 days", subscription: "$99/month" },
                { name: "Mr. D. Moyo", phone: "0712xxxxxx", role: "Business Owner", status: "Expired", trial: "0 days", subscription: "Expired" },
                { name: "Hon. P. Ndlovu", phone: "0734xxxxxx", role: "MP", status: "Trial", trial: "3 days", subscription: "Free" },
                { name: "Ms. L. Sibanda", phone: "0784xxxxxx", role: "CEO", status: "Active", trial: "28 days", subscription: "$99/month" },
            ];

            const total = users.length;
            const active = users.filter(u => u.status === "Active").length;
            const trial = users.filter(u => u.status === "Trial").length;
            const revenue = users.filter(u => u.status === "Active").length * 99;

            document.getElementById('totalUsers').textContent = total;
            document.getElementById('activeUsers').textContent = active;
            document.getElementById('trialUsers').textContent = trial;
            document.getElementById('revenue').textContent = `$${revenue}`;

            let html = '';
            for (let u of users) {
                const statusClass = u.status === 'Active' ? 'status-active' : (u.status === 'Trial' ? 'status-trial' : 'status-expired');
                const statusIcon = u.status === 'Active' ? '✅' : (u.status === 'Trial' ? '⏳' : '❌');
                const roleClass = u.role === 'MP' ? 'mp' : (u.role === 'CEO' ? 'ceo' : (u.role === 'Councillor' ? 'councillor' : 'business'));
                
                html += `
                    <tr>
                        <td><strong>${u.name}</strong></td>
                        <td>${u.phone}</td>
                        <td><span class="role-badge ${roleClass}">${u.role}</span></td>
                        <td class="${statusClass}">${statusIcon} ${u.status}</td>
                        <td>${u.trial}</td>
                        <td>${u.subscription}</td>
                    </tr>
                `;
            }
            document.getElementById('userTable').innerHTML = html;
        }

        loadDemoData();
    </script>
</body>
</html>
