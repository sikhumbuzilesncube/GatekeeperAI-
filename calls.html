<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missed Calls - Gatekeeper AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:20px;padding-bottom:80px}
.header{text-align:center;margin-bottom:20px}
.header h1{color:#FFB300;font-size:24px}
.header p{color:#888;font-size:13px}
.call-card{background:#1a1a2e;border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid}
.call-card.urgent{border-left-color:#e94560}
.call-card.important{border-left-color:#f5a623}
.call-card.normal{border-left-color:#4a4e69}
.call-card .name{font-size:16px;font-weight:bold}
.call-card .number{font-size:13px;color:#bbb}
.call-card .time{font-size:12px;color:#888;margin-top:4px}
.call-card .count{font-size:12px;color:#FFB300;margin-top:2px}
.badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:10px;font-weight:bold;margin-top:6px}
.badge.urgent{background:#e9456020;color:#e94560}
.badge.important{background:#f5a62320;color:#f5a623}
.badge.normal{background:#4a4e6920;color:#4a4e69}
.badge.private{background:#FFB30020;color:#FFB300}
.btn-call{background:#00ff88;color:#000;border:none;padding:4px 12px;border-radius:12px;font-size:11px;font-weight:bold;cursor:pointer;margin-top:6px}
.btn-call:hover{background:#00cc66}
.btn-notes{background:#333;color:#fff;border:none;padding:4px 12px;border-radius:12px;font-size:11px;font-weight:bold;cursor:pointer;margin-top:6px;margin-left:6px}
.btn-notes:hover{background:#444}
.empty-state{text-align:center;padding:40px;color:#666}
.empty-state .icon{font-size:48px;margin-bottom:10px}
.btn{background:#FFB300;color:#000;border:none;padding:10px 20px;border-radius:8px;font-weight:bold;cursor:pointer;font-size:13px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;display:flex;padding:10px;border-top:1px solid #2a2a2a}
.nav-item{flex:1;text-align:center;padding:8px;border-radius:8px;color:#888;font-size:12px;cursor:pointer}
.nav-item.active{background:#FFB30020;color:#FFB300}
</style>
</head>
<body>

<div class="header">
    <h1>📞 Missed Calls</h1>
    <p>Calls you missed — sorted by urgency</p>
</div>

<div id="callsList">
    <div class="empty-state">
        <div class="icon">📭</div>
        <p>No missed calls</p>
        <p style="font-size:12px;margin-top:4px;">Missed calls will appear here automatically.</p>
    </div>
</div>

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;">
    <button class="btn" onclick="window.location.href='gatekeeper_mp_edition.html'">📥 Go to Inbox</button>
</div>

<div class="bottom-nav">
<div class="nav-item" onclick="window.location.href='gatekeeper_mp_edition.html'">Inbox</div>
<div class="nav-item" onclick="window.location.href='meetings.html'">Meetings</div>
<div class="nav-item active">Calls</div>
<div class="nav-item" onclick="window.location.href='daily_summary.html'">Summary</div>
</div>

<script>
const sampleCalls = [
    { name: "Constituent - Ward 4", number: "+263 77 234 5678", time: "10:30 AM", date: "Today", count: 3, urgency: "URGENT", isPrivate: false },
    { name: "Private Number", number: "Private", time: "9:15 AM", date: "Today", count: 2, urgency: "IMPORTANT", isPrivate: true },
    { name: "Parliament Secretariat", number: "+263 71 234 5678", time: "8:45 AM", date: "Today", count: 1, urgency: "NORMAL", isPrivate: false }
];

function loadCalls() {
    const list = document.getElementById('callsList');
    
    if (!sampleCalls.length) {
        list.innerHTML = `
            <div class="empty-state">
                <div class="icon">📭</div>
                <p>No missed calls</p>
            </div>
        `;
        return;
    }

    let html = '';
    for (let c of sampleCalls) {
        const urgencyClass = c.urgency.toLowerCase();
        const badgeClass = urgencyClass;
        const icon = c.urgency === 'URGENT' ? '🔴' : (c.urgency === 'IMPORTANT' ? '🟠' : '⚪');
        const privateBadge = c.isPrivate ? '<span class="badge private">🔒 Private</span>' : '';
        const countText = c.count > 1 ? `📞 Called ${c.count} times` : '';
        
        html += `
            <div class="call-card ${urgencyClass}">
                <div class="name">${icon} ${c.name}</div>
                <div class="number">📱 ${c.number}</div>
                <div class="time">📅 ${c.date} at ${c.time}</div>
                ${countText ? `<div class="count">${countText}</div>` : ''}
                <div>
                    <span class="badge ${badgeClass}">${c.urgency}</span>
                    ${privateBadge}
                    <button class="btn-call" onclick="callNumber('${c.number}')">📞 Call Back</button>
                    <button class="btn-notes" onclick="addNote('${c.name}')">📝 Notes</button>
                </div>
            </div>
        `;
    }
    list.innerHTML = html;
}

function callNumber(number) {
    if (number === 'Private' || number === 'Unknown') {
        alert('Cannot call private numbers. Please check your call log.');
        return;
    }
    window.location.href = 'tel:' + number;
}

function addNote(name) {
    const note = prompt(`Add a note for ${name}:`);
    if (note) {
        alert('✅ Note saved: "' + note + '"');
    }
}

loadCalls();
</script>
</body>
</html>
